<!-- Header -->
<header class="bg-white shadow-sm border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
            <div class="flex items-center space-x-3">
                <a href="/" class="flex items-center space-x-3 hover:opacity-80 transition-opacity">
                    <i data-lucide="building" class="w-8 h-8 text-blue-600"></i>
                    <div>
                        <h1 class="text-xl font-semibold text-gray-900">Vacancy Watch Dashboard</h1>
                        <p class="text-sm text-gray-500">Montgomery, AL Smart Cities Intelligence</p>
                    </div>
                </a>
            </div>
            <div class="flex items-center space-x-4">
                <a href="/" class="flex items-center space-x-2 px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50">
                    <i data-lucide="home" class="w-4 h-4"></i>
                    <span>Home</span>
                </a>
                <button id="refresh-btn" class="flex items-center space-x-2 px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50">
                    <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                    <span>Refresh</span>
                </button>
                <button id="montgomery-data-btn" class="flex items-center space-x-2 px-4 py-2 text-sm font-medium text-blue-700 bg-blue-50 border border-blue-300 rounded-lg hover:bg-blue-100">
                    <i data-lucide="database" class="w-4 h-4"></i>
                    <span>Montgomery Data</span>
                </button>
                <button id="zoning-btn" class="flex items-center space-x-2 px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50">
                    <i data-lucide="map" class="w-4 h-4"></i>
                    <span>Zoning</span>
                </button>
                <button id="urban-investment-btn" class="flex items-center space-x-2 px-4 py-2 text-sm font-medium text-green-700 bg-green-50 border border-green-300 rounded-lg hover:bg-green-100">
                    <i data-lucide="trending-up" class="w-4 h-4"></i>
                    <span>Urban Investment AI</span>
                </button>
                <button id="enrich-zoning-btn" class="flex items-center space-x-2 px-4 py-2 text-sm font-medium text-purple-700 bg-purple-50 border border-purple-300 rounded-lg hover:bg-purple-100">
                    <i data-lucide="layers" class="w-4 h-4"></i>
                    <span>Enrich with Zoning</span>
                </button>
                <button id="surplus-properties-btn" class="flex items-center space-x-2 px-4 py-2 text-sm font-medium text-green-700 bg-green-50 border border-green-300 rounded-lg hover:bg-green-100">
                    <i data-lucide="target" class="w-4 h-4"></i>
                    <span>Surplus Properties</span>
                </button>
                <button id="export-btn" class="flex items-center space-x-2 px-4 py-2 text-sm font-medium text-white bg-blue-600 border border-blue-600 rounded-lg hover:bg-blue-700">
                    <i data-lucide="download" class="w-4 h-4"></i>
                    <span>Export</span>
                </button>
            </div>
        </div>
    </div>
</header>
