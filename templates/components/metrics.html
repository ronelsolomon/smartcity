<!-- Key Metrics -->
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
    <div class="stat-card bg-white rounded-lg shadow-sm border border-gray-200 p-6">
        <div class="flex items-center justify-between">
            <div>
                <p class="text-sm font-medium text-gray-600">Total Properties</p>
                <p id="total-properties" class="text-3xl font-bold text-gray-900">-</p>
                <p class="text-xs text-gray-500 mt-1">Monitored properties</p>
            </div>
            <div class="p-3 bg-blue-50 rounded-lg">
                <i data-lucide="home" class="w-6 h-6 text-blue-600"></i>
            </div>
        </div>
    </div>

    <div class="stat-card bg-white rounded-lg shadow-sm border border-gray-200 p-6">
        <div class="flex items-center justify-between">
            <div>
                <p class="text-sm font-medium text-gray-600">High Risk Vacancies</p>
                <p id="high-risk-count" class="text-3xl font-bold text-red-600">-</p>
                <p class="text-xs text-gray-500 mt-1">Score ≥ 50</p>
            </div>
            <div class="p-3 bg-red-50 rounded-lg">
                <i data-lucide="alert-triangle" class="w-6 h-6 text-red-600"></i>
            </div>
        </div>
    </div>

    <div class="stat-card bg-white rounded-lg shadow-sm border border-gray-200 p-6">
        <div class="flex items-center justify-between">
            <div>
                <p class="text-sm font-medium text-gray-600">Avg Vacancy Score</p>
                <p id="avg-score" class="text-3xl font-bold text-gray-900">-</p>
                <p class="text-xs text-gray-500 mt-1">Risk assessment</p>
            </div>
            <div class="p-3 bg-yellow-50 rounded-lg">
                <i data-lucide="trending-up" class="w-6 h-6 text-yellow-600"></i>
            </div>
        </div>
    </div>

    <div class="stat-card bg-white rounded-lg shadow-sm border border-gray-200 p-6">
        <div class="flex items-center justify-between">
            <div>
                <p class="text-sm font-medium text-gray-600">Active Permits</p>
                <p id="active-permits" class="text-3xl font-bold text-green-600">-</p>
                <p class="text-xs text-gray-500 mt-1">Last 90 days</p>
            </div>
            <div class="p-3 bg-green-50 rounded-lg">
                <i data-lucide="hard-hat" class="w-6 h-6 text-green-600"></i>
            </div>
        </div>
    </div>
</div>
